<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimpleGui Demo</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0a0a1a;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #output {
      font-size: 1rem;
      line-height: 2;
    }
  </style>
</head>
<body>
  <div id="output"></div>
  <script type="module">
    import SimpleGui from './simple-gui.js';

    const params = {
      speed: 50,
      visible: true,
      color: '#6c63ff',
      detail: 5,
      opacity: 0.8,
    };

    const output = document.getElementById('output');

    function updateOutput() {
      if (!output) return;
      output.innerHTML = Object.entries(params)
        .map(([k, v]) => `<div><strong>${k}:</strong> ${v}</div>`)
        .join('');
    }

    const gui = new SimpleGui({ title: 'Settings' });

    gui.add(params, 'speed', 0, 100, 1).onChange(() => updateOutput());
    gui.add(params, 'visible').onChange(() => updateOutput());
    gui.addColor(params, 'color').onChange(() => updateOutput());

    gui.addButton('Reset', () => {
      params.speed = 50;
      params.visible = true;
      params.color = '#6c63ff';
      params.detail = 5;
      params.opacity = 0.8;
      updateOutput();
    });

    const folder = gui.addFolder('Advanced');
    folder.add(params, 'detail', 1, 10, 1).onChange(() => updateOutput());
    folder.add(params, 'opacity', 0, 1, 0.01).onChange(() => updateOutput());

    updateOutput();
  </script>
</body>
</html>
