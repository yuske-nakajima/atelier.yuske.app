<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Earth Orbit Simulator | atelier.yuske.app</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./main.js"></script>
  </head>
  <body>
    <header>
      <a href="/">&larr; トップに戻る</a>
    </header>
    <main>
      <canvas id="canvas"></canvas>
    </main>
    <div id="info-panel">
      <div id="info-coords">緯度: -- / 経度: --</div>
      <div id="info-datetime">日時: --</div>
      <div id="info-orbital">公転角: -- / 自転角: --</div>
      <div id="info-distance">太陽距離: --</div>
    </div>
    <div id="controls">
      <div id="time-display"></div>
      <input type="range" id="time-slider" min="-365" max="365" value="0" />
      <div id="playback-controls">
        <button id="play-pause-btn">&#x23F8;</button>
        <div id="speed-controls">
          <button class="speed-btn" data-speed="1">x1</button>
          <button class="speed-btn" data-speed="10">x10</button>
          <button class="speed-btn" data-speed="100">x100</button>
          <button class="speed-btn" data-speed="1000">x1000</button>
        </div>
      </div>
    </div>
  </body>
</html>
