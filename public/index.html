<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>atelier.yuske.app</title>
    <script>
      // FOUC 防止: CSS 読み込み前にテーマを即座に適用
      (function () {
        var s = localStorage.getItem('theme');
        var t =
          s === 'light' || s === 'dark'
            ? s
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="stylesheet" href="/style.css" />
    <script type="module" src="/main.js"></script>
  </head>
  <body>
    <header>
      <h1>atelier.yuske.app</h1>
      <button
        type="button"
        class="theme-toggle"
        aria-label="テーマを切り替え"
        aria-pressed="false"
      >
        🌙
      </button>
    </header>
    <main>
      <nav>
        <ul>
          <li>
            <a href="/t8-random-pattern/">
              T-8 Random Pattern
              <span class="nav-description">ランダムパターン生成</span>
            </a>
          </li>
          <li>
            <a href="/voxel-walker/">
              Voxel Walker
              <span class="nav-description"
                >天気連動ジェネラティブアート壁紙</span
              >
            </a>
          </li>
          <li>
            <a href="/voxel-explorer/">
              Voxel Explorer
              <span class="nav-description"
                >天気連動ドラクエ風俯瞰ジェネラティブアート</span
              >
            </a>
          </li>
          <li>
            <a href="/earth-orbit-simulator/">
              Earth Orbit Simulator
              <span class="nav-description"
                >地球軌道シミュレーター</span
              >
            </a>
          </li>
          <li>
            <a href="/midi-vj/">
              MIDI VJ
              <span class="nav-description"
                >MIDI キーボードで操作するビジュアルジョッキー</span
              >
            </a>
          </li>
          <li>
            <a href="/simple-gui/">
              Simple GUI
              <span class="nav-description"
                >lil-gui 簡易版 GUI ライブラリ デモ</span
              >
            </a>
          </li>
        </ul>
      </nav>
    </main>
    <footer>
      <p>&copy; atelier.yuske.app</p>
    </footer>
  </body>
</html>
